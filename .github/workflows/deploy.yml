name: Deploy to MonsterASP.NET

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Build & Deploy .NET API
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Restore
        run: dotnet restore TechSolve.sln

      - name: Publish
        run: dotnet publish TechSolve.API/TechSolve.API.csproj -c Release -o ./publish --no-restore

      # Verify web.config is in publish output
      - name: Check publish output
        run: echo "=== Published files ===" ls -la ./publish/ echo "web.config present:" $(test -f ./publish/web.config && echo YES || echo NO)

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./publish/
          # MonsterASP serves from /wwwroot — upload there, NOT to root
          server-dir: /wwwroot/
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            techsolve.db
